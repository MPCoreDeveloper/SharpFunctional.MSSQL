name: publish-nuget

on:
  push:
    tags:
      - 'v*.*.*'

jobs:
  publish:
    runs-on: ubuntu-latest
    permissions:
      contents: read

    steps:
      - name: Checkout
        uses: actions/checkout@v4

      - name: Setup .NET
        uses: actions/setup-dotnet@v4
        with:
          dotnet-version: '10.0.x'

      - name: Restore
        run: dotnet restore SharpFunctional.MSSQL.slnx

      - name: Build
        run: dotnet build SharpFunctional.MSSQL.slnx --configuration Release --no-restore

      - name: Pack
        run: dotnet pack src/SharpFunctional.MSSQL/SharpFunctional.MSSQL.csproj --configuration Release --no-build --output ./artifacts/packages

      - name: Push package to NuGet
        run: dotnet nuget push "./artifacts/packages/*.nupkg" --api-key "${{ secrets.NUGET_API_KEY }}" --source "https://api.nuget.org/v3/index.json" --skip-duplicate
