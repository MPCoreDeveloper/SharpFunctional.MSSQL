version: '3.8'

services:
  mssql:
    image: mcr.microsoft.com/mssql/server:2022-latest
    container_name: sharpfunctional-mssql-test
    environment:
      ACCEPT_EULA: Y
      SA_PASSWORD: YourPassword123!
      MSSQL_PID: Developer
    ports:
      - "1433:1433"
    volumes:
      - mssql-data:/var/opt/mssql
    healthcheck:
      test: ["CMD-SHELL", "/opt/mssql-tools18/bin/sqlcmd -S localhost -U sa -P YourPassword123! -Q 'SELECT 1' || exit 1"]
      interval: 10s
      timeout: 5s
      retries: 5
    networks:
      - sharpfunctional

volumes:
  mssql-data:

networks:
  sharpfunctional:
    driver: bridge
